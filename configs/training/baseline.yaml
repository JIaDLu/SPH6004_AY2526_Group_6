# ── Optimisation ──────────────────────────────────────────────────────────────
epochs:       100
batch_size:   512
lr:           0.0003       # 3e-4  — written as decimal; YAML parses "3e-4" as str
weight_decay: 0.0001       # 1e-4
patience:     10
grad_clip:    1.0
num_workers:  4
seed:         42

# ── Loss ──────────────────────────────────────────────────────────────────────
loss: log_mse

# ── Paths ─────────────────────────────────────────────────────────────────────
ckpt_dir:    checkpoints
output_root: outputs
result_dir:  results

# ── Weights & Biases ──────────────────────────────────────────────────────────
wandb:
  project: sph6004
  entity:  lujiadong-nus